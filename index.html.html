<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>洋美清潔 五星好評填寫</title>
</head>
<body>

<style>
*{box-sizing:border-box;margin:0;padding:0}
.wrap{max-width:560px;margin:0 auto;padding:1.5rem 1rem 3rem;font-family:var(--font-sans)}
h1{font-size:20px;font-weight:500;color:var(--color-text-primary);margin-bottom:4px}
.sub{font-size:13px;color:var(--color-text-secondary);margin-bottom:1.5rem;line-height:1.6}
.section{margin-bottom:1.25rem}
label{display:block;font-size:13px;font-weight:500;color:var(--color-text-secondary);margin-bottom:6px}
input[type=text],select,textarea{width:100%;font-size:14px;padding:10px 12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);outline:none;font-family:var(--font-sans)}
input[type=text]:focus,select:focus,textarea:focus{border-color:var(--color-border-primary);box-shadow:0 0 0 2px rgba(0,0,0,0.06)}
.reviews{display:flex;flex-direction:column;gap:8px;margin-top:6px}
.review-card{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:12px 14px;cursor:pointer;transition:border-color .15s,background .15s;background:var(--color-background-primary);-webkit-tap-highlight-color:rgba(0,0,0,0.05);touch-action:manipulation;user-select:none;-webkit-user-select:none}
.review-card:hover{border-color:var(--color-border-secondary);background:var(--color-background-secondary)}
.review-card.selected{border:1.5px solid #378ADD;background:var(--color-background-info)}
.review-card .rtxt{font-size:13px;color:var(--color-text-primary);line-height:1.7}
.review-card.selected .rtxt{color:var(--color-text-info)}
textarea{resize:none;min-height:140px;line-height:1.7;font-size:14px}
.star{color:#f59e0b;font-size:18px;letter-spacing:2px;margin-bottom:8px}
.btn-copy{width:100%;padding:12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);font-size:14px;font-weight:500;cursor:pointer;font-family:var(--font-sans);margin-bottom:8px}
.btn-copy:hover{background:var(--color-background-secondary)}
.btn-go{width:100%;padding:13px;border-radius:var(--border-radius-md);border:none;background:#2563eb;color:#fff;font-size:14px;font-weight:500;cursor:pointer;font-family:var(--font-sans)}
.btn-go:hover{background:#1d4ed8}
.copied{font-size:12px;color:var(--color-text-success);text-align:center;display:none;margin-top:4px}
.hint{font-size:12px;color:var(--color-text-secondary);margin-top:6px;line-height:1.6}
.step-label{font-size:11px;font-weight:500;color:var(--color-text-secondary);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:0.5px solid var(--color-border-tertiary)}
</style>

<div class="wrap">
  <h1>洋美清潔 &#8231; 五星好評填寫</h1>
  <p class="sub">填寫約需 1 分鐘，完成後一鍵複製貼上 Google 即可</p>

  <div class="section">
    <div class="step-label">步驟 1 &#8231; 基本資料</div>
    <label>您的暱稱</label>
    <input type="text" id="nickname" placeholder="例：王小姐、台北陳先生" oninput="rebuild()">
  </div>

  <div class="section">
    <label>服務區域</label>
    <select id="region" onchange="rebuild()">
      <option value="">請選擇區域</option>
      <optgroup label="台北市">
        <option>台北市信義區</option><option>台北市大安區</option><option>台北市中山區</option>
        <option>台北市松山區</option><option>台北市內湖區</option><option>台北市南港區</option>
        <option>台北市士林區</option><option>台北市北投區</option><option>台北市中正區</option>
        <option>台北市萬華區</option><option>台北市文山區</option><option>台北市大同區</option>
      </optgroup>
      <optgroup label="新北市">
        <option>新北市板橋區</option><option>新北市新莊區</option><option>新北市三重區</option>
        <option>新北市中和區</option><option>新北市永和區</option><option>新北市新店區</option>
        <option>新北市土城區</option><option>新北市汐止區</option><option>新北市蘆洲區</option>
        <option>新北市樹林區</option><option>新北市鶯歌區</option><option>新北市淡水區</option>
        <option>新北市三峽區</option><option>新北市林口區</option><option>新北市泰山區</option>
      </optgroup>
    </select>
  </div>

  <div class="section">
    <label>服務人員姓名 <span style="font-weight:400;color:var(--color-text-secondary)">（選填）</span></label>
    <input type="text" id="staff" placeholder="例：劉師傅、陳督導、志宇師傅" oninput="rebuild()">
  </div>

  <div class="section">
    <div class="step-label">步驟 2 &#8231; 施作項目</div>
    <select id="service" onchange="loadReviews()">
      <option value="">請選擇項目</option>
      <option value="office">辦公室清潔</option>
      <option value="community">社區清潔</option>
      <option value="pest">消毒除蟲</option>
      <option value="carpet">洗地毯</option>
      <option value="wax">洗地打蠟</option>
      <option value="crystal">晶化美容保養</option>
    </select>
  </div>

  <div class="section" id="review-section" style="display:none">
    <div class="step-label">步驟 3 &#8231; 選擇最符合的評價</div>
    <div class="reviews" id="reviews"></div>
  </div>

  <div class="section" id="edit-section" style="display:none">
    <div class="step-label">步驟 4 &#8231; 確認並修改您的評價</div>
    <div class="star">★★★★★</div>
    <textarea id="final" oninput="userEdited=true"></textarea>
    <p class="hint">內容已自動帶入您的資訊，可直接修改成自己的話，文字越自然越好</p>
  </div>

  <div id="btn-section" style="display:none;margin-top:1.5rem">
    <button class="btn-copy" onclick="copyText()">複製評價內容</button>
    <button class="btn-go" onclick="goGoogle()">前往 Google 貼上評價</button>
    <p class="copied" id="copied-msg">已複製！請點上方按鈕前往 Google 評價頁貼上</p>
  </div>
</div>

let selectedIdx = -1;
let userEdited = false;

function getFields(){
  return {
    nickname: document.getElementById('nickname').value.trim(),
    region: document.getElementById('region').value,
    staff: document.getElementById('staff').value.trim(),
    service: document.getElementById('service').value
  };
}

function fillTemplate(tpl, f){
  let t = tpl;
  t = t.replace(/\{region\}/g, f.region || '我們所在區域');
  if(f.staff){
    t = t.replace(/\{staff\}/g, f.staff);
  } else {
    t = t.replace(/，\{staff\}到場後/g,'，師傅到場後')
         .replace(/，\{staff\}帶領/g,'，師傅帶領')
         .replace(/，\{staff\}每次來/g,'，清潔人員每次來')
         .replace(/，\{staff\}作業/g,'，師傅作業')
         .replace(/，\{staff\}施作/g,'，師傅施作')
         .replace(/，\{staff\}過程中/g,'，師傅過程中')
         .replace(/，\{staff\}依照/g,'，師傅依照')
         .replace(/，\{staff\}事前/g,'，師傅事前')
         .replace(/洋美的\{staff\}/g,'洋美師傅')
         .replace(/洋美的\{staff\}/g,'洋美師傅')
         .replace(/\{staff\}/g,'師傅');
  }
  return t;
}

function loadReviews(){
  selectedIdx = -1;
  userEdited = false;
  const f = getFields();
  const svc = f.service;
  const rs = document.getElementById('review-section');
  const es = document.getElementById('edit-section');
  const bs = document.getElementById('btn-section');
  if(!svc){ rs.style.display='none'; es.style.display='none'; bs.style.display='none'; return; }
  rs.style.display='block';
  es.style.display='none';
  bs.style.display='none';
  const reviews = DB[svc];
  const div = document.getElementById('reviews');
  div.innerHTML = reviews.map((r,i)=>`
    <div class="review-card" id="rc${i}" data-idx="${i}">
      <div class="rtxt">${fillTemplate(r,f)}</div>
    </div>
  `).join('');
  div.querySelectorAll('.review-card').forEach(card=>{
    card.addEventListener('touchend', function(e){ e.preventDefault(); selectReview(parseInt(this.dataset.idx)); });
    card.addEventListener('click', function(){ selectReview(parseInt(this.dataset.idx)); });
  });
}

function selectReview(i){
  selectedIdx = i;
  userEdited = false;
  document.querySelectorAll('.review-card').forEach((c,idx)=>{
    c.classList.toggle('selected', idx===i);
  });
  rebuild();
  document.getElementById('edit-section').style.display='block';
  document.getElementById('btn-section').style.display='block';
  setTimeout(()=>{
    document.getElementById('edit-section').scrollIntoView({behavior:'smooth',block:'start'});
  },100);
}

function rebuild(){
  if(selectedIdx < 0) return;
  if(userEdited) return;
  const f = getFields();
  const svc = f.service;
  if(!svc) return;
  let txt = fillTemplate(DB[svc][selectedIdx], f);
  if(f.nickname) txt = txt + '\n\n（' + f.nickname + '）';
  document.getElementById('final').value = txt;
  const div = document.getElementById('reviews');
  const cards = div.querySelectorAll('.review-card');
  DB[svc].forEach((r,idx)=>{
    if(cards[idx]) cards[idx].querySelector('.rtxt').textContent = fillTemplate(r,f);
  });
}

function copyText(){
  const txt = document.getElementById('final').value;
  if(!txt) return;
  navigator.clipboard.writeText(txt).then(()=>{
    const m = document.getElementById('copied-msg');
    m.style.display='block';
    setTimeout(()=>m.style.display='none', 3500);
  }).catch(()=>{
    document.getElementById('final').select();
    document.execCommand('copy');
    const m = document.getElementById('copied-msg');
    m.style.display='block';
    setTimeout(()=>m.style.display='none', 3500);
  });
}

function goGoogle(){
  copyText();
  window.open('https://g.page/r/CQn2Irpra0P_EAE/review','_blank');
}
</script>
</body></html>
